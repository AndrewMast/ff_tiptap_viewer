name: OIDC check

# Diagnostic only: confirms whether `id-token: write` actually grants the GitHub
# OIDC token at runtime (required for pub.dev automated publishing). Run it
# manually from the Actions tab — it does not publish anything. Safe to delete
# once the publish flow works.
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Report OIDC availability
        run: |
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "RESULT: OIDC is available — 'id-token: write' is in effect."
          else
            echo "RESULT: OIDC NOT available — 'id-token: write' was not granted."
            echo "This is a repo/account Actions policy, not the workflow code."
          fi
