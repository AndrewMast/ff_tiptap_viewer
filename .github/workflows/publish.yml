name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.0

      - name: Verify tag, pubspec, and changelog agree
        run: |
          # The trigger only fires on `v*` tags, so the leading `v` is present;
          # require it explicitly as a guard, then strip it for comparison.
          case "$GITHUB_REF_NAME" in
            v*) version="${GITHUB_REF_NAME#v}" ;;
            *)
              echo "::error::Tag ($GITHUB_REF_NAME) must start with 'v'."
              exit 1 ;;
          esac

          pubspec="$(grep -E '^version:' pubspec.yaml | sed -E 's/^version:[[:space:]]*//')"
          echo "Tag version:     $version"
          echo "pubspec version: $pubspec"
          if [ "$version" != "$pubspec" ]; then
            echo "::error::Tag ($version) does not match pubspec.yaml version ($pubspec)."
            exit 1
          fi

          # Require a changelog heading for this version, e.g. `## [2.0.0] - ...`.
          # The date is not validated. Dots are escaped so they match literally.
          version_re="$(printf '%s' "$version" | sed 's/\./\\./g')"
          if ! grep -Eq "^## \[$version_re\] - " CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$version] - <date>' entry."
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # Provisions the pub.dev OIDC credentials (needs `id-token: write`). The
      # publish command itself doesn't mint the token — without this step it
      # falls back to interactive auth and hangs.
      - uses: dart-lang/setup-dart@v1

      - name: Publish
        # `flutter pub publish` (not `dart`) so the `sdk: flutter` deps resolve;
        # auth comes from the setup-dart step above. timeout guards a hang.
        timeout-minutes: 3
        run: flutter pub publish --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"

          # The version's entries: everything under `## [X.Y.Z] - <date>` up to
          # the next `## ` heading or the link-reference block, header excluded.
          # Leading/trailing blank lines are trimmed inside awk (portable).
          notes="$(awk -v ver="$version" '
            index($0, "## [" ver "]") == 1 { grab = 1; next }
            grab && (/^## / || /^\[[^]]+\]: /) { exit }
            grab { lines[n++] = $0 }
            END {
              s = 0;     while (s < n   && lines[s] ~ /^[[:space:]]*$/) s++
              e = n - 1; while (e >= s  && lines[e] ~ /^[[:space:]]*$/) e--
              for (i = s; i <= e; i++) print lines[i]
            }
          ' CHANGELOG.md)"

          # The version's reference link from the bottom of the changelog. Strip
          # the `[version]:` definition prefix to get the bare URL, then render
          # it as a labeled inline link (a bare definition line wouldn't show).
          version_re="$(printf '%s' "$version" | sed 's/\./\\./g')"
          link="$(grep -E "^\[$version_re\]: " CHANGELOG.md || true)"
          url="$(printf '%s' "$link" | sed -E 's/^\[[^]]*\]:[[:space:]]*//')"

          body="$notes"
          if [ -n "$url" ]; then
            body="$(printf '%s\n\n**Changes in %s:** [%s](%s)\n' \
              "$notes" "$GITHUB_REF_NAME" "$GITHUB_REF_NAME" "$url")"
          fi

          printf '%s' "$body" | gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file -
